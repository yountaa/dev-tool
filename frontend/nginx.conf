# Это ШАБЛОН: образ nginx:alpine при старте подставит сюда ${FRONTEND_PORT} и
# положит результат в conf.d/default.conf. Переменные $uri и т.п. он не трогает.
#
# Бэкенды берём из upstream backend_pool — его собирает скрипт
# docker-entrypoint.d/10-backend-upstream.sh из BACKEND_URL (один адрес или список
# через запятую для HA). Балансировка least_conn, мёртвая нода временно исключается.
#
# Этот внутренний nginx отдаёт статику и проксирует API на бэкенд. Снаружи перед
# ним стоит твой общий nginx (TLS, серты, нормальное имя хоста).
# --- Access-лог с личностью (NDJSON, как у бэкенда) ---------------------------
# Пишем, ЧТО дошло до ЭТОГО nginx от oauth2-proxy и что ответил бэкенд. Сравнивай
# с логом бэкенда (события http.request / auth.*):
#   здесь user есть, а бэкенд пишет local  → имя теряется на хопе nginx → бэкенд;
#   здесь user пустой                      → теряется раньше (oauth2-proxy или внешний nginx).
# Значение групп не пишем (бывает огромным) — только присутствие ($groups_state);
# сами группы смотри в /access/debug или в событии auth.me бэкенда. Cookie не
# пишем (сессия) — общий вес запроса виден в request_length (строка + заголовки).
map $http_x_forwarded_groups $groups_state {
    default "present";
    ""      "missing";
}
log_format authlog escape=json '{"ts":"$time_iso8601","src":"front-nginx",'
    '"remote":"$remote_addr","method":"$request_method","path":"$request_uri",'
    '"status":$status,"upstream_status":"$upstream_status",'
    '"request_length":$request_length,'
    '"user":"$http_x_forwarded_preferred_username",'
    '"email":"$http_x_forwarded_email",'
    '"fwd_user":"$http_x_forwarded_user",'
    '"groups":"$groups_state"}';

server {
    listen ${FRONTEND_PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Лог всех запросов в stdout контейнера в формате выше.
    access_log /dev/stdout authlog;

    # Сжимаем текстовые ответы: JS/CSS-бандл и JSON API (targets и имена метрик —
    # мегабайты текста, gzip режет их в ~10 раз). Бэкенд и сам сжимает (GZip
    # middleware) — тогда nginx не сжимает повторно, только пропускает.
    gzip on;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;

    # --- Большие заголовки/куки от внешнего oauth2-proxy ----------------------
    # Прокси кладёт в запрос крупную session-cookie и X-Forwarded-Groups с ПОЛНЫМ
    # списком групп Keycloak. При многих группах это перерастает дефолтные буферы
    # nginx (large_client_header_buffers 4 8k): nginx рубит запрос (400 «Request
    # Header Or Cookie Too Large») или теряет заголовки — тогда до бэкенда не
    # доезжает X-Forwarded-Preferred-Username, и пользователь становится «local».
    # Даём заголовкам большой запас (одна строка заголовка помещается в один буфер).
    client_header_buffer_size 64k;
    large_client_header_buffers 16 128k;
    # Запас на буферы ответа бэкенда (не критично для имени, но пусть будет с запасом).
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;

    # Запросы к API уводим на пул бэкендов (см. upstream backend_pool). У всех
    # API-путей одинаковый проброс личности/групп от oauth2-proxy на бэкенд:
    # имя (для атрибуции) и группы (для RBAC — /access/me и доступ к вкладкам).
    # Без прокси заголовки пустые — бэкенд берёт фолбэк/локальный режим.
    location /silences/ {
        proxy_pass http://backend_pool;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header X-Forwarded-Preferred-Username $http_x_forwarded_preferred_username;
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
        proxy_set_header X-Forwarded-User $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
    }
    location /victoria/ {
        proxy_pass http://backend_pool;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header X-Forwarded-Preferred-Username $http_x_forwarded_preferred_username;
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
        proxy_set_header X-Forwarded-User $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
    }
    location /access/ {
        proxy_pass http://backend_pool;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header X-Forwarded-Preferred-Username $http_x_forwarded_preferred_username;
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
        proxy_set_header X-Forwarded-User $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
    }
    location /health {
        proxy_pass http://backend_pool;
    }
    # Короткие ссылки: POST /share создаёт, GET /s/<id> редиректит на полный путь.
    location /share {
        proxy_pass http://backend_pool;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
    location /s/ {
        proxy_pass http://backend_pool;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # Хешированные ассеты (vite кладёт хэш в имя) — кешируем надолго, они иммутабельны.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Остальное — статика SPA. Нет файла — отдаём index.html. index.html НЕ кешируем,
    # иначе после пересборки браузер тянет старый бандл (и, напр., ломается автокомплит).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
