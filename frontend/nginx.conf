# Это ШАБЛОН: образ nginx:alpine при старте подставит сюда переменные окружения
# (${FRONTEND_PORT}, ${BACKEND_URL}) и положит результат в conf.d/default.conf.
# Переменные $uri и т.п. он не трогает — подставляются только заданные env.
#
# Этот внутренний nginx отдаёт статику и проксирует API на бэкенд. Снаружи перед
# ним стоит твой общий nginx (TLS, серты, нормальное имя хоста).
server {
    listen ${FRONTEND_PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Запросы к API уводим на бэкенд (адрес задаётся переменной BACKEND_URL).
    location /silences/ {
        proxy_pass ${BACKEND_URL};
        # Личность от oauth2-proxy (если он стоит впереди) пробрасываем на бэкенд.
        # Без прокси заголовки пустые — бэкенд берёт фолбэк. Имя с дефисами nginx
        # отдаёт как есть, явный proxy_set_header — чтобы не зависеть от настроек.
        proxy_set_header X-Forwarded-Preferred-Username $http_x_forwarded_preferred_username;
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
        proxy_set_header X-Forwarded-User $http_x_forwarded_user;
    }
    location /health {
        proxy_pass ${BACKEND_URL};
    }

    # Остальное — статика SPA. Нет файла — отдаём index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
