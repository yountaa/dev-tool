# Оверлей для проверки авторизации: Keycloak + oauth2-proxy перед вебом.
#
# Запуск:
#   docker-compose -f docker-compose.yml -f docker-compose.auth.yml up --build
#
# Открыть http://localhost:4180 → редирект на Keycloak → логин:
#   ivan.petrov / ivan      (или maria.sidorova / maria)
# После логина имя пользователя автоматически подставляется как создатель silence,
# а в git-коммит пишется, кто что сделал.
#
# Прямой доступ во фронт (http://localhost:8080) остаётся для режима без авторизации —
# тогда поднимай только базовый docker-compose.yml.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./auth/realm-silences.json:/opt/keycloak/data/import/realm-silences.json:ro
    ports:
      - "8081:8080"   # консоль админа: http://localhost:8081 (admin/admin)

  # AUTH_ENABLED=true только в этом режиме — бэкенд начинает брать имя из заголовка.
  backend:
    environment:
      AUTH_ENABLED: "true"
      AUTH_USER_HEADER: "X-Forwarded-Preferred-Username"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://frontend:80           # весь веб (статика + /silences/) идёт за прокси
      - --provider=oidc
      - --skip-oidc-discovery=true
      # Браузерные урлы — через KEYCLOAK_BROWSER_URL (localhost), серверные (redeem/jwks/issuer) —
      # через KEYCLOAK_INTERNAL_URL (имя сервиса в сети compose). Для НАСТОЯЩЕГО Keycloak,
      # доступного по одному адресу и браузеру, и контейнеру, выстави обе переменные одинаково.
      - --login-url=${KEYCLOAK_BROWSER_URL:-http://localhost:8081}/realms/${KEYCLOAK_REALM:-silences}/protocol/openid-connect/auth
      - --redeem-url=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}/realms/${KEYCLOAK_REALM:-silences}/protocol/openid-connect/token
      - --oidc-jwks-url=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}/realms/${KEYCLOAK_REALM:-silences}/protocol/openid-connect/certs
      - --oidc-issuer-url=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}/realms/${KEYCLOAK_REALM:-silences}
      - --insecure-oidc-skip-issuer-verification=true
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-secret123}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
      - --cookie-secure=false
      - --email-domain=*
      - --pass-user-headers=true                 # ставит X-Forwarded-Preferred-Username на upstream
      - --redirect-url=${OAUTH2_PROXY_REDIRECT_URL:-http://localhost:4180/oauth2/callback}
      - --skip-provider-button=true
    ports:
      - "4180:4180"   # точка входа для пользователя
    depends_on:
      - keycloak
      - frontend
