# Локальный стенд для проверки: фронт, бэк и тестовый Alertmanager.
# Переменные берутся из файла .env рядом.
services:
  alertmanager:
    image: prom/alertmanager:latest
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"

  # Локальный Prometheus: считает демо-правила из alert.rules.yml (большинство
  # всегда горят) и шлёт их в Alertmanager. Отсюда вкладка «Алерты» берёт правила
  # (rules_<env>=http://prometheus:9090). Без него список алертов пустой.
  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - alertmanager

  # Postgres для локальной проверки режима STORAGE_BACKEND=postgres.
  # Не мешает режиму local — просто будет простаивать. На проде поднимаешь свой кластер.
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${PG_DB:-devtool}
      - POSTGRES_USER=${PG_USER:-devtool}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-secret}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data/:/app/.hub-repo
    depends_on:
      - alertmanager
      - prometheus
      - postgres

  frontend:
    build: ./frontend
    environment:
      # Куда внутренний nginx фронта проксирует API. По умолчанию — сервис backend
      # в этой же сети; переопредели BACKEND_URL в .env, если бек на другом адресе.
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
