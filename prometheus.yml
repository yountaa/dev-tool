# Локальный Prometheus для стенда: считает демо-правила и шлёт их в Alertmanager.
# Вкладка «Алерты» тянет правила отсюда через GET /api/v1/rules.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  # Скрейпим сам Prometheus и Alertmanager — так у стенда есть реальные метрики
  # (для вкладки Query/Cardinality) и несколько целей (для вкладки Targets).
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
  # Демо-job с несколькими таргетами (часть down) — чтобы на вкладке Targets было
  # видно группировку по job и счётчик up/total (как в Prometheus).
  - job_name: demo_app
    static_configs:
      - targets: ['prometheus:9090', 'demo-node-1:9100', 'demo-node-2:9100', 'demo-node-3:9100']
